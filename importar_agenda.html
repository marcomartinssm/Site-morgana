*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8f7f9;color:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:12px;padding:32px;max-width:480px;width:100%;border:0.5px solid rgba(0,0,0,.08);box-shadow:0 4px 24px rgba(0,0,0,.06)}

p{font-size:13px;color:#888;margin-bottom:24px;line-height:1.6}

.stat-card{background:#f4f2f6;border-radius:8px;padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:300;color:#5c4470}
.stat-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

button:hover{background:#7d6090}
button:disabled{background:#ccc;cursor:not-allowed}
.log{margin-top:20px;background:#f4f2f6;border-radius:8px;padding:14px;font-size:12px;color:#555;max-height:220px;overflow-y:auto;line-height:1.8;display:none}
.ok{color:#2e7d4f}
.err{color:#b85050}
.progress{margin-top:16px;background:#f0edf5;border-radius:20px;height:8px;overflow:hidden;display:none}
.progress-bar{height:100%;background:#5c4470;border-radius:20px;width:0%;transition:width .3s}
</style>

<script>
const SUPA_URL='https://tvqbftidjhytnadyayoo.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2cWJmdGlkamh5dG5hZHlheW9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTM0MTMsImV4cCI6MjA5MTA2OTQxM30.THkQ8mViDJaT4UEzLafU1yk0ag8KwLBM5uBF-aWgYG0';

function log(msg, cls=''){
  const el=document.getElementById('log');
  el.style.display='block';
  el.innerHTML+=`<div class="${cls}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}
function setProgress(pct){ document.getElementById('progBar').style.width=pct+'%'; }

async function startImport(){
  const btn=document.getElementById('btn');
  btn.disabled=true; btn.textContent='Importando...';
  document.getElementById('prog').style.display='block';
  
  const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  
  // Flatten all appointments
  const all=[];
  for(const [dk,evs] of Object.entries(GCAL_APPTS)){
    for(const e of evs) all.push({...e,date_key:dk});
  }
  
  log(`Iniciando importação de ${all.length} agendamentos...`);
  
  const batchSize=50;
  let done=0, errors=0;
  
  for(let i=0;i<all.length;i+=batchSize){
    const batch=all.slice(i,i+batchSize).map(e=>({
      id:e.id,
      date_key:e.date_key,
      time:e.time,
      name:e.name,
      svc:e.svc,
      dur:e.dur||'—',
      status:e.status||'confirmed',
      client_id:null,
      obs:e.obs||'',
      valor:e.valor||0,
      fpag:e.fpag||'pix'
    }));
    
    const {error}=await sb.from('agendamentos').upsert(batch,{onConflict:'id',ignoreDuplicates:true});
    if(error){
      errors++;
      log(`⚠ Lote ${Math.floor(i/batchSize)+1}: ${error.message}`,'err');
    } else {
      done+=batch.length;
    }
    
    const pct=Math.round((i+batchSize)/all.length*100);
    setProgress(Math.min(pct,100));
    if((i/batchSize)%5===0) log(`✓ ${done} importados...`,'ok');
    
    // Small delay to avoid rate limiting
    await new Promise(r=>setTimeout(r,100));
  }
  
  setProgress(100);
  if(errors===0){
    log(`✅ Concluído! ${done} agendamentos importados com sucesso.`,'ok');
    btn.textContent='✅ Importação concluída!';
    btn.style.background='#2e7d4f';
  } else {
    log(`⚠ Concluído com ${errors} erros. ${done} importados.`,'err');
    btn.textContent='⚠ Concluído com erros';
  }
}
</script>
