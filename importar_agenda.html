*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8f7f9;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:12px;padding:32px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.06)}
h1{font-size:18px;font-weight:600;color:#5c4470;margin-bottom:6px}
p{font-size:13px;color:#888;margin-bottom:24px;line-height:1.6}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.stat-card{background:#f4f2f6;border-radius:8px;padding:14px;text-align:center}
.stat-val{font-size:24px;font-weight:300;color:#5c4470}
.stat-lbl{font-size:10px;color:#888;text-transform:uppercase;margin-top:3px}
button{width:100%;padding:13px;border-radius:8px;background:#5c4470;color:#fff;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}

.log{margin-top:20px;background:#f4f2f6;border-radius:8px;padding:14px;font-size:12px;color:#555;max-height:220px;overflow-y:auto;line-height:1.8;display:none}
.ok{color:#2e7d4f}.err{color:#b85050}
.progress{margin-top:16px;background:#f0edf5;border-radius:20px;height:8px;overflow:hidden;display:none}
.progress-bar{height:100%;background:#5c4470;border-radius:20px;width:0%;transition:width .3s}
</style>

</div>

function log(msg,cls){const el=document.getElementById('log');el.style.display='block';el.innerHTML+='<div class="'+(cls||'')+'">'+msg+'</div>';el.scrollTop=el.scrollHeight;}
function setProgress(pct){document.getElementById('progBar').style.width=pct+'%';}
async function startImport(){
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Importando...';
  document.getElementById('prog').style.display='block';
  const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  const all=[];
  for(const [dk,evs] of Object.entries(GCAL_APPTS)) for(const e of evs) all.push({...e,date_key:dk});
  log('Iniciando: '+all.length+' agendamentos...');
  const sz=50;let done=0,errors=0;
  for(let i=0;i<all.length;i+=sz){
    const batch=all.slice(i,i+sz).map(e=>({
      id:e.id,date_key:e.date_key,time:e.time,name:e.name,
      svc:e.svc,dur:'-',status:e.status||'pending',
      client_id:null,obs:'',valor:e.valor||0,fpag:'pix'
    }));
    const {error}=await sb.from('agendamentos').upsert(batch,{onConflict:'id',ignoreDuplicates:true});
    if(error){errors++;log('Erro: '+error.message,'err');}else done+=batch.length;
    setProgress(Math.min(Math.round((i+sz)/all.length*100),100));
    if(i%150===0&&i>0) log(done+' importados...','ok');
    await new Promise(r=>setTimeout(r,80));
  }
  setProgress(100);
  if(errors===0){log('Concluido! '+done+' importados com sucesso.','ok');btn.textContent='Concluido!';btn.style.background='#2e7d4f';}
  else{log('Concluido com '+errors+' erros. '+done+' importados.','err');btn.textContent='Verificar erros';}
}
</script>
